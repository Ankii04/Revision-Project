<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSA Revision</title>
    <style>
      /* ── Reset & Base ─────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0a0d12;
        --card: #131720;
        --border: rgba(255,255,255,0.07);
        --primary: #3b82f6;
        --primary-glow: rgba(59,130,246,0.25);
        --text: #f1f5f9;
        --muted: #64748b;
        --green: #22c55e;
        --red: #ef4444;
        --yellow: #f59e0b;
      }

      body {
        width: 360px;
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 13px;
        min-height: 200px;
      }

      /* ── Header ───────────────────────────────────────── */
      .header {
        background: linear-gradient(135deg, #0f1729 0%, #131720 100%);
        border-bottom: 1px solid var(--border);
        padding: 16px 18px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo {
        width: 32px; height: 32px;
        background: linear-gradient(135deg, var(--primary), #818cf8);
        border-radius: 9px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 20px var(--primary-glow);
        flex-shrink: 0;
      }
      .logo svg { width: 18px; height: 18px; fill: white; }
      .header-text h1 {
        font-size: 14px; font-weight: 800;
        letter-spacing: -0.03em; line-height: 1;
        font-style: italic; text-transform: uppercase;
      }
      .header-text p { font-size: 10px; color: var(--muted); margin-top: 2px; letter-spacing: 0.04em; }

      /* ── Status badge ─────────────────────────────────── */
      .status-row {
        display: flex; align-items: center; gap: 8px;
        padding: 12px 18px;
        background: rgba(34,197,94,0.04);
        border-bottom: 1px solid var(--border);
      }
      .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pulse 1.8s ease-in-out infinite; }
      .dot.inactive { background: var(--muted); animation: none; }
      @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,0.4)} 50%{opacity:0.8;box-shadow:0 0 0 4px rgba(34,197,94,0)} }
      .status-text { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
      .status-text.on { color: var(--green); }
      .status-text.off { color: var(--muted); }
      .toggle-btn {
        margin-left: auto;
        padding: 4px 10px;
        border-radius: 6px; border: 1px solid var(--border);
        background: transparent; color: var(--text);
        font-size: 10px; font-weight: 700; cursor: pointer;
        letter-spacing: 0.05em; text-transform: uppercase;
        transition: all 0.2s;
      }
      .toggle-btn:hover { background: rgba(255,255,255,0.06); }

      /* ── Stats ────────────────────────────────────────── */
      .stats {
        display: grid; grid-template-columns: 1fr 1fr;
        gap: 1px; background: var(--border);
        border-bottom: 1px solid var(--border);
      }
      .stat {
        background: var(--bg);
        padding: 14px 18px;
      }
      .stat-val { font-size: 26px; font-weight: 900; font-style: italic; line-height: 1; color: var(--primary); }
      .stat-label { font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 3px; }

      /* ── URL Config ───────────────────────────────────── */
      .config { padding: 14px 18px; border-bottom: 1px solid var(--border); }
      .config label { display: block; font-size: 9px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
      .url-row { display: flex; gap: 6px; }
      .url-input {
        flex: 1; padding: 7px 10px;
        background: var(--card); border: 1px solid var(--border);
        border-radius: 8px; color: var(--text);
        font-size: 11px; font-family: 'SF Mono', monospace;
        outline: none; transition: border-color 0.2s;
      }
      .url-input:focus { border-color: rgba(59,130,246,0.5); }
      .save-btn {
        padding: 7px 12px;
        background: var(--primary); color: white;
        border: none; border-radius: 8px;
        font-size: 10px; font-weight: 800; cursor: pointer;
        letter-spacing: 0.05em; text-transform: uppercase;
        transition: opacity 0.2s;
      }
      .save-btn:hover { opacity: 0.85; }
      .save-btn:active { opacity: 0.7; }

      /* ── CTA ──────────────────────────────────────────── */
      .cta {
        padding: 14px 18px;
        display: flex; gap: 8px;
      }
      .cta-btn {
        flex: 1; padding: 9px;
        border-radius: 10px; border: 1px solid var(--border);
        background: var(--card); color: var(--text);
        font-size: 10px; font-weight: 800;
        cursor: pointer; text-align: center;
        letter-spacing: 0.05em; text-transform: uppercase;
        transition: all 0.2s; text-decoration: none; display: block;
      }
      .cta-btn:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); }
      .cta-btn.primary {
        background: linear-gradient(135deg, var(--primary) 0%, #6366f1 100%);
        border-color: transparent; color: white;
        box-shadow: 0 4px 16px var(--primary-glow);
      }
      .cta-btn.primary:hover { opacity: 0.9; }

      /* ── Footer ───────────────────────────────────────── */
      .footer { padding: 10px 18px; border-top: 1px solid var(--border); text-align: center; }
      .footer a { color: var(--muted); font-size: 10px; text-decoration: none; letter-spacing: 0.05em; }
      .footer a:hover { color: var(--primary); }

      /* ── Toast ────────────────────────────────────────── */
      .toast {
        position: fixed; bottom: 12px; left: 18px; right: 18px;
        background: rgba(34,197,94,0.12); border: 1px solid rgba(34,197,94,0.3);
        color: var(--green); padding: 8px 12px;
        border-radius: 8px; font-size: 11px; font-weight: 700;
        text-align: center; letter-spacing: 0.05em;
        opacity: 0; transition: opacity 0.3s;
      }
      .toast.show { opacity: 1; }
    </style>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
  </head>
  <body>

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M9.5,3A6.5,6.5 0 0,1 16,9.5C16,11.11 15.41,12.57 14.44,13.69L14.71,14H15.5L20.5,19L19,20.5L14,15.5V14.71L13.69,14.44C12.57,15.41 11.11,16 9.5,16A6.5,6.5 0 0,1 3,9.5A6.5,6.5 0 0,1 9.5,3M9.5,5C7,5 5,7 5,9.5C5,12 7,14 9.5,14C12,14 14,12 14,9.5C14,7 12,5 9.5,5Z"/></svg>
      </div>
      <div class="header-text">
        <h1>DSA Revision</h1>
        <p>Auto-capture your solutions</p>
      </div>
    </div>

    <!-- Status Row -->
    <div class="status-row">
      <div class="dot" id="statusDot"></div>
      <span class="status-text on" id="statusText">ACTIVE — WATCHING LeetCode &amp; GFG</span>
      <button class="toggle-btn" id="toggleBtn">Pause</button>
    </div>

    <!-- Stats Grid -->
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="totalCaptured">0</div>
        <div class="stat-label">Captured Today</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="totalAllTime">—</div>
        <div class="stat-label">Total Synced</div>
      </div>
    </div>

    <!-- Website URL Config -->
    <div class="config">
      <label>Dashboard URL</label>
      <div class="url-row">
        <input class="url-input" type="text" id="urlInput" placeholder="http://localhost:3000" />
        <button class="save-btn" id="saveUrl">Save</button>
      </div>
    </div>

    <!-- CTA Buttons -->
    <div class="cta">
      <a class="cta-btn primary" id="openDashboard" href="#" target="_blank">Open Dashboard</a>
      <a class="cta-btn" id="openRevision" href="#" target="_blank">Start Revision</a>
    </div>

    <!-- Footer -->
    <div class="footer">
      <a href="#">DSA Revision v1.0.0 — Manifest V3</a>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">✓ Settings saved!</div>

    <script src="popup.js"></script>
  </body>
</html>
